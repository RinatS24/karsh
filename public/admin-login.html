<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Админка — CarShare</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="center">
    <div class="card">
      <h1>Админ-панель</h1>
      <div class="sub">Вход для администратора. По умолчанию: <code>admin@carshare.local</code> / <code>admin123</code></div>
      <div id="alert" class="alert" style="display:none"></div>
      <form id="loginForm">
        <div class="field">
          <label>E-mail</label>
          <input type="email" name="email" required value="admin@carshare.local">
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" name="password" required value="admin123">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Войти</button>
      </form>
      <div class="center-link">
        <a href="/">← К клиентскому входу</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    (async () => {
      try {
        await api('/api/admin/me');
        window.location.href = '/admin.html';
      } catch (_) {}
    })();

    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('loginBtn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertEl);
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        const fd = new FormData(form);
        await api('/api/admin/login', {
          method: 'POST',
          body: { email: fd.get('email'), password: fd.get('password') }
        });
        window.location.href = '/admin.html';
      } catch (err) {
        showError(alertEl, err.message);
        btn.disabled = false; btn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
