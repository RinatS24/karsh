<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Паспорт — CarShare</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <header class="app-header">
      <div class="logo">Car<span>Share</span></div>
      <div class="nav"><a href="#" id="logoutLink">Выйти</a></div>
    </header>

    <div class="container">
      <div class="section">
        <h2>Паспорт</h2>
        <div class="sub">Шаг 3 из 3. Сфотографируйте разворот с фото — система автоматически распознает данные.</div>
        <div id="alert" class="alert" style="display:none"></div>

        <div id="uploadStep">
          <div class="upload-zone" id="zone">
            <input type="file" accept="image/*" id="fileInput" style="display:none">
            <div class="icon">📄</div>
            <div class="label">Загрузить фото разворота паспорта</div>
          </div>
          <div style="height:12px"></div>
          <button class="btn btn-primary" id="uploadBtn" disabled>Распознать данные</button>
        </div>

        <div id="ocrStep" style="display:none">
          <div class="alert alert-info">✓ Данные распознаны</div>
          <div class="row">
            <div class="field"><label>Серия</label><input id="series" disabled></div>
            <div class="field"><label>Номер</label><input id="number" disabled></div>
          </div>
          <div class="field"><label>ФИО</label><input id="fullName" disabled></div>
          <div class="field"><label>Дата рождения</label><input id="birthDate" disabled></div>
          <button class="btn btn-primary" id="finishBtn">Завершить и перейти к авто</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let file = null;
    const alertEl = document.getElementById('alert');

    (async () => {
      const user = await requireAuth();
      if (user.passport && user.status === 'active') window.location.href = '/map.html';
    })();

    const input = document.getElementById('fileInput');
    const zone = document.getElementById('zone');
    zone.addEventListener('click', () => input.click());
    input.addEventListener('change', () => {
      file = input.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = (e) => {
        zone.classList.add('has-file');
        zone.innerHTML = `<img src="${e.target.result}"><div class="label" style="margin-top:8px">${file.name}</div>`;
      };
      r.readAsDataURL(file);
      document.getElementById('uploadBtn').disabled = false;
    });

    document.getElementById('uploadBtn').addEventListener('click', async () => {
      hideAlert(alertEl);
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Распознаём...';
      try {
        const fd = new FormData();
        fd.append('photo', file);
        const res = await api('/api/passport/upload', { method: 'POST', body: fd });
        await new Promise(r => setTimeout(r, 1200));
        document.getElementById('series').value = res.passport.series;
        document.getElementById('number').value = res.passport.number;
        document.getElementById('fullName').value = res.passport.fullName;
        document.getElementById('birthDate').value = res.passport.birthDate;
        document.getElementById('uploadStep').style.display = 'none';
        document.getElementById('ocrStep').style.display = 'block';
      } catch (err) {
        showError(alertEl, err.message);
        btn.disabled = false; btn.textContent = 'Распознать данные';
      }
    });

    document.getElementById('finishBtn').addEventListener('click', () => {
      window.location.href = '/map.html';
    });

    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await api('/api/logout', { method: 'POST' });
      window.location.href = '/';
    });
  </script>
</body>
</html>
