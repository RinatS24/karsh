<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Водительское удостоверение — CarShare</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <header class="app-header">
      <div class="logo">Car<span>Share</span></div>
      <div class="nav">
        <a href="#" id="logoutLink">Выйти</a>
      </div>
    </header>

    <div class="container">
      <div class="section">
        <h2>Водительское удостоверение</h2>
        <div class="sub">Шаг 2 из 3. Сфотографируйте обе стороны ВУ. Система распознает данные автоматически.</div>
        <div id="alert" class="alert" style="display:none"></div>

        <div id="uploadStep">
          <div class="row" style="margin-bottom:16px">
            <div>
              <div class="upload-zone" id="frontZone">
                <input type="file" accept="image/*" id="frontInput" style="display:none">
                <div class="icon">📷</div>
                <div class="label">Лицевая сторона</div>
              </div>
            </div>
            <div>
              <div class="upload-zone" id="backZone">
                <input type="file" accept="image/*" id="backInput" style="display:none">
                <div class="icon">📷</div>
                <div class="label">Обратная сторона</div>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" id="uploadBtn" disabled>Распознать данные</button>
        </div>

        <div id="ocrStep" style="display:none">
          <div class="alert alert-info">
            ✓ Данные распознаны. Проверьте корректность и подтвердите.
          </div>
          <div class="field">
            <label>Номер ВУ</label>
            <input id="ocrNumber">
          </div>
          <div class="field">
            <label>ФИО</label>
            <input id="ocrFullName">
          </div>
          <div class="row">
            <div class="field">
              <label>Категория</label>
              <input id="ocrCategory">
            </div>
            <div class="field">
              <label>Дата выдачи</label>
              <input id="ocrIssue" placeholder="ДД.ММ.ГГГГ">
            </div>
            <div class="field">
              <label>Действует до</label>
              <input id="ocrExpire" placeholder="ДД.ММ.ГГГГ">
            </div>
          </div>
          <button class="btn btn-primary" id="confirmBtn">Подтвердить и продолжить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let frontFile = null, backFile = null;
    const alertEl = document.getElementById('alert');

    (async () => {
      const user = await requireAuth();
      if (user.license && user.license.status === 'approved') {
        window.location.href = user.passport ? '/map.html' : '/passport.html';
      }
    })();

    function attachFileInput(inputId, zoneId, onFile) {
      const input = document.getElementById(inputId);
      const zone = document.getElementById(zoneId);
      zone.addEventListener('click', () => input.click());
      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return;
        onFile(file);
        const reader = new FileReader();
        reader.onload = (e) => {
          zone.classList.add('has-file');
          zone.innerHTML = `<img src="${e.target.result}"><div class="label" style="margin-top:8px">${file.name}</div>`;
        };
        reader.readAsDataURL(file);
      });
    }
    attachFileInput('frontInput', 'frontZone', f => { frontFile = f; checkReady(); });
    attachFileInput('backInput', 'backZone', f => { backFile = f; checkReady(); });

    function checkReady() {
      document.getElementById('uploadBtn').disabled = !(frontFile && backFile);
    }

    document.getElementById('uploadBtn').addEventListener('click', async () => {
      hideAlert(alertEl);
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Распознаём...';
      try {
        const fd = new FormData();
        fd.append('front', frontFile);
        fd.append('back', backFile);
        const res = await api('/api/license/upload', { method: 'POST', body: fd });
        document.getElementById('ocrNumber').value = res.ocr.number;
        document.getElementById('ocrFullName').value = res.ocr.fullName;
        document.getElementById('ocrCategory').value = res.ocr.category;
        document.getElementById('ocrIssue').value = res.ocr.issueDate;
        document.getElementById('ocrExpire').value = res.ocr.expireDate;
        document.getElementById('uploadStep').style.display = 'none';
        document.getElementById('ocrStep').style.display = 'block';
      } catch (err) {
        showError(alertEl, err.message);
        btn.disabled = false; btn.textContent = 'Распознать данные';
      }
    });

    document.getElementById('confirmBtn').addEventListener('click', async () => {
      hideAlert(alertEl);
      const btn = document.getElementById('confirmBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Проверяем...';
      try {
        await new Promise(r => setTimeout(r, 1500));
        await api('/api/license/confirm', {
          method: 'POST',
          body: {
            number: document.getElementById('ocrNumber').value,
            fullName: document.getElementById('ocrFullName').value,
            category: document.getElementById('ocrCategory').value,
            issueDate: document.getElementById('ocrIssue').value,
            expireDate: document.getElementById('ocrExpire').value
          }
        });
        window.location.href = '/passport.html';
      } catch (err) {
        showError(alertEl, err.message);
        btn.disabled = false; btn.textContent = 'Подтвердить и продолжить';
      }
    });

    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await api('/api/logout', { method: 'POST' });
      window.location.href = '/';
    });
  </script>
</body>
</html>
